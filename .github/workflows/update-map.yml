name: Update restaurant map

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libudunits2-dev

      - name: Install R packages
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); install.packages(c("readr","dplyr","stringr","tidygeocoder","leaflet","htmlwidgets"), dependencies = TRUE)'
          Rscript -e 'library(readr); library(dplyr); library(stringr); library(tidygeocoder); library(leaflet); library(htmlwidgets)'

      - name: Generate map
        run: |
          Rscript R/mapa_restaurants.R

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.html
          git diff --cached --quiet || git commit -m "Update restaurant map"
          git push
