name: build restaurant map

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "R/mapa_restaurants.R"
      - "data/**"
      - ".github/workflows/update-map.yml"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup R
        uses: r-lib/actions/setup-r@v2

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: install R packages
        run: |
          Rscript -e 'install.packages(c(
            "readr",
            "dplyr",
            "stringr",
            "leaflet",
            "htmlwidgets",
            "httr2",
            "purrr",
            "tibble"
          ), repos = "https://cloud.r-project.org")'

      - name: show repo files
        run: |
          pwd
          ls -R

      - name: build map
        run: |
          Rscript R/mapa_restaurants.R

      - name: commit updated cache and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/geocoded_cache.csv site/index.html || true

          if ! git diff --cached --quiet; then
            git commit -m "update map and geocoding cache"
            git push
          else
            echo "No changes to commit"
          fi

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
